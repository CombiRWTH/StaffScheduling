[project]
name = "staffscheduling"
version = "0.0.0"
description = ""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "flask>=3.1.0",
    "matplotlib>=3.10.1",
    "mkdocs-material>=9.6.12",
    "numpy>=2.2.5",
    "ortools>=9.12.4544",
]

[dependency-groups]
dev = [
    "pre-commit>=4.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
sources = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[project.scripts]
solve = "main:main"
